<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>欢迎来到我的主页</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
    <p v-for="item in items">{{ item }}</p>
</div>
<script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
<script>
    var vm = new Vue({
        el: "#app",
        data: {
            items: [
                "新青年标准", "自由的而非奴隶的", "进步的而非保守的", "进取的而非退隐的", "世界的而非锁国的", "实利的而非虚文的", "科学的而非想象的", "强壮的而非体弱的"
            ]
        }
    })
</script>
</body>
</html>
